seed: 42
device: "cuda"

paths:
  data_root: "./data/tiny-imagenet-200"
  output_root: "./outputs_ckks_unlearning"

  # use the same partition file generated by your prior FL / CKKS run if possible
  partition_file: "./outputs_ckks/stats/client_indices.json"

  # full CKKS FL checkpoint from your completed CKKS training
  base_ckks_checkpoint: "./outputs_ckks/checkpoints/global_best_ckks.pt"

  oracle_root: "./outputs_ckks_unlearning/oracle"
  unlearn_root: "./outputs_ckks_unlearning/unlearn"
  eval_root: "./outputs_ckks_unlearning/eval"
  mia_root: "./outputs_ckks_unlearning/mia"

dataset:
  image_size: 64
  num_classes: 200

model:
  name: "resnet18"
  pretrained: false

dataloader:
  num_workers: 4
  pin_memory: true

fl:
  num_clients: 10
  dirichlet_alpha: 0.1
  batch_size: 64
  eval_batch_size: 128
  local_epochs: 1
  lr: 0.01
  momentum: 0.9
  weight_decay: 0.0005

oracle:
  rounds: 50

unlearning:
  forget_client_id: 0
  rounds: 10
  lr: 0.001
  local_epochs: 1

ckks:
  poly_modulus_degree: 8192
  coeff_mod_bit_sizes: [60, 40, 40, 60]
  global_scale_power: 40
  chunk_size: 4096

mia:
  max_member_samples: 1000
  max_nonmember_samples: 1000