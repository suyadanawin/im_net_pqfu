seed: 42
device: "cuda"

paths:
  data_root: "./data/tiny-imagenet-200"
  partition_file: "./outputs_phase2/stats/client_indices.json"

  output_root: "./outputs_pq_16384/ckks"
  ckpt_dir: "./outputs_pq_16384/ckks/checkpoints"
  log_dir: "./outputs_pq_16384/ckks/logs"
  metrics_dir: "./outputs_pq_16384/ckks/metrics"
  plots_dir: "./outputs_pq_16384/ckks/plots"
  stats_dir: "./outputs_pq_16384/ckks/stats"

  base_ckks_checkpoint: "./outputs_pq_16384/ckks/checkpoints/global_best_ckks.pt"

  oracle_root: "./outputs_pq_16384/oracle"
  unlearn_root: "./outputs_pq_16384/unlearn"
  eval_root: "./outputs_pq_16384/eval"
  mia_root: "./outputs_pq_16384/mia"

dataset:
  image_size: 64
  num_classes: 200

model:
  name: "resnet18"
  pretrained: false

dataloader:
  num_workers: 4
  pin_memory: true

fl:
  num_clients: 10
  dirichlet_alpha: 0.1
  batch_size: 64
  eval_batch_size: 128
  local_epochs: 1
  lr: 0.01
  momentum: 0.9
  weight_decay: 0.0005
  rounds: 10

oracle:
  rounds: 50

unlearning:
  forget_client_id: 0
  rounds: 10
  lr: 0.001
  local_epochs: 1

ckks:
  poly_modulus_degree: 16384
  coeff_mod_bit_sizes: [60, 40, 40, 40, 40, 60]
  global_scale_power: 40
  chunk_size: 4096

mia:
  max_member_samples: 1000
  max_nonmember_samples: 1000