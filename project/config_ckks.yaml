seed: 42
device: cuda

paths:
  data_root: ./data/tiny-imagenet-200
  output_root: ./outputs_ckks
  ckpt_dir: ./outputs_ckks/checkpoints
  log_dir: ./outputs_ckks/logs
  metrics_dir: ./outputs_ckks/metrics
  plots_dir: ./outputs_ckks/plots
  stats_dir: ./outputs_ckks/stats

dataset:
  name: tiny-imagenet-200
  num_classes: 200
  image_size: 64

model:
  name: resnet18
  pretrained: false

fl:
  num_clients: 10
  dirichlet_alpha: 0.1
  rounds: 10
  local_epochs: 1
  batch_size: 64
  eval_batch_size: 128
  lr: 0.01
  momentum: 0.9
  weight_decay: 0.0005
  sample_fraction: 1.0

ckks:
  enabled: true
  poly_modulus_degree: 8192
  coeff_mod_bit_sizes: [60, 40, 40, 60]
  global_scale_power: 40
  chunk_size: 4096
  store_serialized_ciphertexts: false
  decrypt_after_aggregation: true

dataloader:
  num_workers: 4
  pin_memory: true