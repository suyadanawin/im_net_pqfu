seed: 42
device: "cuda"   # use "cpu" if no GPU

paths:
  data_root: "./data/tiny-imagenet-200"
  output_root: "./outputs_phase2"
  ckpt_dir: "./outputs_phase2/checkpoints"
  log_dir: "./outputs_phase2/logs"
  metrics_dir: "./outputs_phase2/metrics"
  stats_dir: "./outputs_phase2/stats"

dataset:
  name: "tiny-imagenet-200"
  num_classes: 200
  image_size: 64

dataloader:
  num_workers: 4
  pin_memory: true

model:
  name: "resnet18"
  pretrained: false

fl:
  num_clients: 10
  dirichlet_alpha: 0.5
  rounds: 10
  local_epochs: 1
  batch_size: 64
  eval_batch_size: 128
  lr: 0.01
  momentum: 0.9
  weight_decay: 0.0005
  min_samples_per_client: 10

save:
  save_every_round: true
  save_best_only: false